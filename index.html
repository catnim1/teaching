function search() {
  const input = document.getElementById('nameInput').value.trim();
  const resultDiv = document.getElementById('result');
  const errorMsg = document.getElementById('errorMsg');
  resultDiv.style.display = 'none';
  errorMsg.style.display = 'none';
  if (!input) return;
  const student = data[input];
  if (!student) { errorMsg.style.display = 'block'; return; }
  document.getElementById('studentName').textContent = input + ' 학생';
  document.getElementById('studentMajor').textContent = student.major;
  const fList = document.getElementById('feedbackList');
  fList.innerHTML = '';
  student.feedback.forEach(item => { const li = document.createElement('li'); li.textContent = item; fList.appendChild(li); });
  const aList = document.getElementById('aiList');
  aList.innerHTML = '';
  student.aiAdvice.forEach(item => {
    const li = document.createElement('li');
    li.innerHTML = item.replace(/\(([^)]+)\)/g, (m, p1) => `<span class="ref">${p1}</span>`);
    aList.appendChild(li);
  });
  resultDiv.style.display = 'block';
  resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
